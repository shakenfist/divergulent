name: Sample output

permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  sample:
    runs-on: [self-hosted, debian-13, s]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # setuptools_scm needs full history

      - name: Install build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y -q python3 python3-venv python3-pip

      - name: Restore divergulent cache
        uses: actions/cache@v4
        with:
          path: .divergulent-ci-cache
          key: divergulent-sample-cache-${{ github.run_id }}
          restore-keys: |
            divergulent-sample-cache-

      - name: Generate sample output
        env:
          DIVERGULENT_CACHE_DIR: ${{ github.workspace }}/.divergulent-ci-cache
        run: tools/generate-sample-output.sh sample-output

      - name: Upload sample output
        uses: actions/upload-artifact@v7
        with:
          name: sample-output
          path: sample-output/
