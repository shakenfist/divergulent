name: Build BTS index

permissions:
  contents: read

# Builds the Debian BTS bug index (bug -> source, status) from UDD once a week and
# publishes it to the rolling 'bts' prerelease, so every operator's
# `divergulent-classify bts` is one polite HTTP GET of a gzipped TSV instead of a
# UDD query. Pure public data -- unsigned, regenerable at will. One central query
# per week keeps aggregate UDD load reasonable (the "one polite crawler" thesis).
on:
  schedule:
    - cron: '17 4 * * 1'  # Mondays 04:17 UTC
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the index to the rolling 'bts' release
        type: boolean
        default: false

jobs:
  build:
    runs-on: [self-hosted, debian-13, s]

    permissions:
      contents: write  # publish the index to the 'bts' release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y -q postgresql-client

      - name: Build BTS index
        run: tools/build-bts.sh "bts/bts-index.tsv.gz"

      - name: Upload BTS index artifact
        uses: actions/upload-artifact@v7
        with:
          name: bts-index
          path: bts/

      # Scheduled runs always publish; a manual run publishes only when asked.
      - name: Publish BTS index
        if: github.event_name == 'schedule' || github.event.inputs.publish == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: tools/publish-bts.sh "bts/bts-index.tsv.gz"
